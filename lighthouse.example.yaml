# Lighthouse agent configuration.
#
# `token` is the only required field — minted in the Status Harbor Console
# when you click "+ New Lighthouse" and shown only once.
#
# The Console URL is hardcoded to https://lighthouse.statusharbor.io and
# is not configurable. The agent never persists or transmits its
# lighthouse_id; the server resolves it from the token.
token: lh_REPLACE_ME

# Optional. Defaults shown.
agent:
  data_dir: /var/lib/lighthouse
  max_concurrent_checks: 10
  log_level: info        # info | debug
