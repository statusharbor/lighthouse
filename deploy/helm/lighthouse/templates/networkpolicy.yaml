{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "lighthouse.fullname" . }}
  labels:
    {{- include "lighthouse.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "lighthouse.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    {{- if .Values.healthz.enabled }}
    # Kubelet liveness/readiness probes. Kubelet's source IP varies per
    # cluster (node IP), so allow from any source on the probe port.
    - ports:
        - protocol: TCP
          port: {{ .Values.healthz.port }}
    {{- end }}
    {{- with .Values.networkPolicy.additionalIngress }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  egress:
    # DNS lookups (kube-dns / CoreDNS).
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Outbound HTTPS — covers:
    #   - The Status Harbor Console
    #   - HTTPS check targets
    #   - When k8sstats.enabled=true: the in-cluster Kubernetes
    #     apiserver (kubernetes.default.svc — a ClusterIP Service
    #     within this 0.0.0.0/0 allow). The collector reaches each
    #     kubelet via the apiserver proxy
    #     (/api/v1/nodes/{name}/proxy/stats/summary), so the apiserver
    #     egress is the only k8s-internal path required.
    # Excludes link-local / instance-metadata (169.254.0.0/16) by default
    # to prevent SSRF-style misuse from check definitions.
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
            except:
              - 169.254.0.0/16
      ports:
        - protocol: TCP
          port: 443
    {{- with .Values.networkPolicy.additionalEgress }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
{{- end }}
