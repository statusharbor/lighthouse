# Default values for the lighthouse chart.

image:
  repository: ghcr.io/statusharbor/lighthouse
  # Defaults to .Chart.AppVersion when empty.
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []

# Health probes (Kubernetes liveness/readiness). When enabled, the agent
# starts an HTTP server on this port serving /healthz/{live,ready}.
# Liveness fails when the most-recent successful Console heartbeat is
# older than ~45s; readiness flips to 200 after the first /register.
healthz:
  enabled: true
  port: 9093
  livenessProbe:
    initialDelaySeconds: 30
    periodSeconds: 30
    failureThreshold: 3
    timeoutSeconds: 3
  readinessProbe:
    initialDelaySeconds: 5
    periodSeconds: 10
    failureThreshold: 3
    timeoutSeconds: 3

# The lighthouse token from the Status Harbor Console.
#
# Provide via either:
#   1. --set token=lh_xxx_yyy (chart will create a Secret named
#      "{{ release }}-token")
#   2. existingSecret.name: my-secret + key: my-key (use a Secret you
#      manage out-of-band, e.g. via External Secrets / Sealed Secrets)
token: ""

existingSecret:
  name: ""
  key: token

# Agent-side tuning. Serialized into a ConfigMap mounted at
# /etc/lighthouse/lighthouse.yaml. Token is supplied via env, never here.
# Empty fields fall back to lighthouse's compiled-in defaults.
agent:
  dataDir: ""              # default: /var/lib/lighthouse
  maxConcurrentChecks: 0   # default: 10
  logLevel: ""             # default: info  (set to "debug" for verbose logs)

# Auto-discovery of monitor candidates from Kubernetes Ingress and
# externally-facing Service resources. The agent watches the
# configured namespaces and pushes suggestions to the Console; users
# adopt them into real monitors from the Lighthouse detail page.
#
# Service surface: LoadBalancer + NodePort only. ClusterIP, headless
# (clusterIP=None) and ExternalName services are skipped, as are
# kube-system / kube-public / kube-node-lease namespaces.
#
# namespaces:
#   - empty list or ["*"] ⇒ all-namespaces (chart installs a
#     ClusterRole + ClusterRoleBinding bound to the agent's
#     ServiceAccount).
#   - ["a", "b"]          ⇒ scoped to those namespaces (per-namespace
#     Role + RoleBinding for each).
#
# Enabled by default for the Helm install path — the whole point of
# running Lighthouse on Kubernetes is to discover what's there.
# Disable explicitly with --set discovery.enabled=false if you want
# zero cluster-scoped RBAC, or scope it down with
# --set 'discovery.namespaces={prod,staging}' to use per-namespace
# Roles instead of a ClusterRole.
discovery:
  enabled: true
  namespaces: ["*"]

serviceAccount:
  create: true
  name: ""
  annotations: {}

# StatefulSet replica count. MUST be 1 — the chart fails the install
# otherwise. Two agents sharing one token would post duplicate
# observations to the Console. To run multiple lighthouses on a cluster,
# install this chart multiple times with separate tokens (one Helm
# release per network location).
replicaCount: 1

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 256Mi

persistence:
  # When false, /var/lib/lighthouse is an emptyDir — buffered events are
  # lost on pod restart. Disable only if your Console is highly available.
  enabled: true
  size: 5Gi
  accessMode: ReadWriteOnce
  storageClass: ""

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 10001
  runAsGroup: 101
  fsGroup: 101
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

podAnnotations: {}
podLabels: {}

nodeSelector: {}
tolerations: []
affinity: {}

# terminationGracePeriodSeconds — how long k8s waits between SIGTERM
# and SIGKILL when the pod is being stopped. Default 60s gives the
# agent room to flush its event buffer, post /shutdown, and (when
# this binary also runs the API server) drain up to 35s of in-flight
# async notification dispatches. Kubernetes default of 30s is too
# short — the drain budget alone is 35s — so leaving this unset
# would let SIGKILL fire mid-drain on the central pod every time.
terminationGracePeriodSeconds: 60

# Optional: extra environment variables passed to the container.
extraEnv: []
# - name: HTTPS_PROXY
#   value: http://proxy.internal:3128

# Cluster-shape metrics collector (Phase 2.4) — emits k8s_*
# series (cluster CPU/memory %, node counts, pod phases per
# namespace, PVC fill). Runs only on the central StatefulSet pod
# (the DaemonSet's host_metrics role gates it off). The collector
# is harmless when these permissions are missing — it just logs and
# skips — so the knob below only controls whether the chart
# installs the supporting RBAC.
#
# Off by default so `helm upgrade` from an older chart version
# doesn't silently add a new ClusterRole + Binding to clusters
# whose security teams audit RBAC drift (FedRAMP, HIPAA, anyone
# enforcing change control on cluster-scoped permissions). Opt in
# with --set k8sstats.enabled=true once you've reviewed the
# permissions table below.
#
# RBAC granted when enabled:
#   - nodes / pods / persistentvolumeclaims : get, list
#   - nodes/proxy                            : get  (apiserver-proxy
#     hop into each kubelet's /stats/summary for live usage %).
#
# Egress: the central pod needs to reach the apiserver
# (KUBERNETES_SERVICE_HOST:KUBERNETES_SERVICE_PORT) for both list
# calls and the /stats/summary fan-out. If networkPolicy.enabled
# is true add the apiserver endpoint to additionalEgress; on most
# clusters that's a host network IP, not a Service ClusterIP.
k8sstats:
  enabled: false

# Per-node host-metrics DaemonSet (Phase 2.1).
#
# Off by default so existing installs keep their single-pod behaviour
# on upgrade. Enable to ship per-node host metrics (cpu / mem / disk
# / net per node) without the central pod's containerised view.
#
# All DaemonSet pods share the same Secret-mounted token as the
# central StatefulSet. The Console flips the bound Lighthouse to
# allow_multi_instance=true on the first registration of any k8s
# agent, so N pods sharing one token won't 409 each other; per-node
# rows appear under the Lighthouse's "Active agents" section keyed by
# spec.nodeName (downward API).
#
# PSA caveat: hostPath /proc + /sys mounts are forbidden under the
# `restricted` Pod Security Admission profile. Label your namespace
# `baseline` or `privileged`, or supply a custom podSecurityContext /
# containerSecurityContext that satisfies your cluster's policy.
daemonset:
  enabled: false
  # When true, also mount the node's /sys read-only at /host/sys.
  # Reserved for a future kernel-stat collector — off by default to
  # minimise the privilege surface.
  mountHostSys: false
  # When true, bind-mount the node's / read-only at /host/root and set
  # LIGHTHOUSE_HOST_ROOT=/host/root so the per-mount disk collector
  # statfs()es the host's filesystems instead of the pod's view. Without
  # this, /proc/mounts (read via the /host/proc bind-mount) lists the
  # node's mountpoints correctly but syscall.Statfs resolves each path
  # through the pod's own mount namespace — so /var/lib/docker either
  # doesn't exist (silently skipped) or returns the container's emptyDir
  # at the same path.
  #
  # On by default once the DaemonSet itself is enabled: a user who flipped
  # daemonset.enabled=true did so to get per-node metrics, and silently
  # broken disk numbers are a worse failure mode than a more visible
  # privilege surface they explicitly opted into. Set to false on
  # clusters where Pod Security Admission (`restricted` profile) or
  # OPA/Gatekeeper/Kyverno policies forbid hostPath: / even read-only —
  # the install otherwise fails to admit the DaemonSet pod.
  #
  # Privilege note: hostPath: / read-only lets a compromised pod read
  # any file on the node (including kubelet-materialised Secrets under
  # /var/lib/kubelet/pods/*/volumes/...). The collector itself only
  # calls syscall.Statfs (capacity metadata, no file content), but the
  # volume mount can't be narrowed to that one syscall.
  #
  # Linux-only: the env var is consumed by the Linux host-metrics
  # collector (statfs path prefixing). The darwin / windows collectors
  # use sysctl / WMI and ignore it. Windows Kubernetes nodes are not
  # supported by this chart in general — the agent image is Alpine
  # (uid 10001, apk-installed CA bundle) so it can only run as a Linux
  # container on a Linux node.
  mountHostRoot: true
  # When true, the pod shares the host's PID namespace. Off by
  # default; the current /proc snapshot collector doesn't need it.
  hostPID: false
  extraEnv: []
  podLabels: {}
  podAnnotations: {}
  # Default DaemonSet tolerations: tolerate every NoSchedule taint so
  # the agent lands on every node - control-plane, dedicated workload
  # pools (e.g. workload=victoriametrics:NoSchedule), spot/preemptible
  # pools, GPU nodes, anything. Mirrors what Prometheus node-exporter,
  # Datadog agent, Cilium and kube-proxy do: a node-level metrics agent
  # whose job is "every node, no exceptions" must ignore taints by
  # design. Taints exist to keep regular workloads off; observability
  # daemons should opt in to every node. If you really want lighthouse
  # to skip a node, use daemonset.nodeSelector instead. NoExecute is
  # *not* tolerated here on purpose: if a node is being evicted we
  # want the DaemonSet pod to leave with everything else.
  tolerations:
    - operator: Exists
      effect: NoSchedule
  nodeSelector: {}
  affinity: {}
  # Override resources, podSecurityContext, containerSecurityContext
  # individually; omitting any falls back to the central StatefulSet
  # values above (which run as non-root uid 10001).
  #
  # DEFAULT: run the DaemonSet as root. The central StatefulSet stays
  # non-root for the hardened posture; the per-node DaemonSet needs
  # root because kubelet's pod-volume tree
  # (/var/lib/kubelet/pods/<uid>/volumes/.../mount) is owned by root
  # with 0700 / 0750 perms. A non-root agent can't even *traverse*
  # those directories, so syscall.Statfs fails with EACCES on every
  # PV mount - the disk panel silently omits attached PVs (200GB
  # PD-SSDs, etc.) even though they appear in /host/proc/1/mounts.
  # Every comparable node-level metrics agent ships the same way:
  # Prometheus node-exporter, Datadog agent, Falco, netdata, Cilium.
  # The "DaemonSet for node observability runs as root" expectation
  # is the universally-understood baseline.
  #
  # To opt out (e.g. PSA `restricted` namespace that forbids
  # runAsUser:0), override podSecurityContext explicitly here. You'll
  # lose visibility into PV-mounted disks - the rest of the host
  # metrics (CPU, mem, network, the COS stateful partition) still
  # report fine.
  resources: {}
  podSecurityContext:
    runAsNonRoot: false
    runAsUser: 0
    runAsGroup: 0
    seccompProfile:
      type: RuntimeDefault
  # Container security context keeps the rest of the hardened defaults
  # (read-only rootfs, no privilege escalation, drop all caps) - running
  # as root gives us directory-traversal perms, which is the only thing
  # we needed; we don't need to give back the other capabilities.
  containerSecurityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL

# PodDisruptionBudget. Off by default — voluntary disruptions
# (node drains, cluster autoscaler) recreate the pod elsewhere with
# only a brief gap, which is usually acceptable. Enable if you need
# to block drains entirely (e.g., scheduled-maintenance windows where
# uninterrupted monitoring is required).
podDisruptionBudget:
  enabled: false
  # Set exactly one of these:
  minAvailable: 1
  # maxUnavailable: 0

# NetworkPolicy. Off by default because the agent legitimately needs
# broad outbound to reach the Console *and* every check target you
# configure. Enable for defense-in-depth, then list your check targets
# under additionalEgress to keep checks working.
#
# Built-in rules when enabled:
#   - Ingress: TCP on healthz.port from any source (kubelet probes;
#     kubelet's source IP varies per cluster). Empty if healthz disabled.
#   - Egress:  UDP/TCP 53 to any (DNS), TCP 443 to 0.0.0.0/0 minus
#     link-local (Console + HTTPS check targets + apiserver Service).
#
# When k8sstats.enabled=true the central pod also needs egress to the
# Kubernetes apiserver. The default 0.0.0.0/0:443 rule covers it
# because the in-cluster `kubernetes.default.svc` Service is a
# ClusterIP within that allow. If you tighten the egress to a named
# Service / CIDR list, add an explicit apiserver rule, e.g.:
#
#   additionalEgress:
#     - to:
#         - namespaceSelector: { matchLabels: { kubernetes.io/metadata.name: default } }
#           podSelector:       { matchLabels: { component: kube-apiserver } }
#       ports:
#         - { protocol: TCP, port: 443 }
#
# Without it the collector silently 0%/0-counter for every k8s_*
# usage metric — only structural ones (k8s_node_count etc.) keep
# working because they use a separate code path under the same
# allow.
networkPolicy:
  enabled: false
  additionalIngress: []
  # Append rules for each check protocol/target you use, e.g.:
  additionalEgress: []
  # - to:
  #     - namespaceSelector: { matchLabels: { kubernetes.io/metadata.name: production } }
  #   ports:
  #     - { protocol: TCP, port: 8080 }
  #     - { protocol: TCP, port: 5432 }
