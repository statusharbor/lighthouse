name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  GO_VERSION: '1.26.x'

jobs:
  build:
    name: Build
    if: "!startsWith(github.event.head_commit.message, 'chore(release):')"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os: [linux, darwin, windows]
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build (${{ matrix.os }}/${{ matrix.arch }})
        env:
          CGO_ENABLED: '0'
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
        run: go build -o /dev/null ./cmd/lighthouse

  test:
    name: Test
    if: "!startsWith(github.event.head_commit.message, 'chore(release):')"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - run: go mod download

      - run: go mod verify

      - name: Run tests
        run: go test -v -timeout 300s -race -coverprofile=coverage.out -covermode=atomic ./...

  lint:
    name: Lint
    if: "!startsWith(github.event.head_commit.message, 'chore(release):')"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: latest
          args: --timeout=5m

  helm-lint:
    name: Helm Lint
    if: "!startsWith(github.event.head_commit.message, 'chore(release):')"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5

      - uses: azure/setup-helm@v4
        with:
          version: latest

      - name: helm lint (default values)
        run: helm lint deploy/helm/lighthouse --set token=lh_test

      - name: helm template — default values
        run: helm template lighthouse deploy/helm/lighthouse --set token=lh_test > /dev/null

      - name: helm template — PDB + NetworkPolicy enabled
        run: |
          helm template lighthouse deploy/helm/lighthouse \
            --set token=lh_test \
            --set podDisruptionBudget.enabled=true \
            --set networkPolicy.enabled=true > /dev/null

      - name: helm template — existingSecret path
        run: |
          helm template lighthouse deploy/helm/lighthouse \
            --set existingSecret.name=lighthouse-token \
            --set existingSecret.key=token > /dev/null

      - name: replicaCount=2 must be rejected by validation guard
        run: |
          if helm template lighthouse deploy/helm/lighthouse \
              --set token=lh_test --set replicaCount=2 > /dev/null 2>&1; then
            echo "::error::replicaCount=2 should fail but didn't — singleton guard is broken"
            exit 1
          fi
          echo "guard rejected replicaCount=2 as expected"

  notify-failure:
    name: Notify Failure
    runs-on: ubuntu-latest
    needs: [build, test, lint, helm-lint]
    if: ${{ always() && (needs.build.result == 'failure' || needs.test.result == 'failure' || needs.lint.result == 'failure' || needs.helm-lint.result == 'failure') }}
    steps:
      - name: Send Telegram notification on failure
        uses: appleboy/telegram-action@v0.1.1
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            CI Failed - Lighthouse

            Repository: ${{ github.repository }}
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
            Message: ${{ github.event.head_commit.message }}
            Author: ${{ github.actor }}

            View: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [build, test, lint, helm-lint]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push' && !startsWith(github.event.head_commit.message, 'chore(release):')
    permissions:
      contents: write     # push tag, create GitHub release
      issues: write
      pull-requests: write
      id-token: write     # cosign keyless via OIDC
      packages: write     # push images to ghcr.io
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v5
        with:
          node-version: '22'

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Install syft
        uses: anchore/sbom-action/download-syft@v0

      - name: Set up QEMU (cross-arch container builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: latest

      - name: Install semantic-release
        run: |
          npm install -g --loglevel=error \
            semantic-release@23 \
            @semantic-release/git@10 \
            @semantic-release/exec@6 \
            @semantic-release/commit-analyzer@11 \
            @semantic-release/release-notes-generator@12 \
            conventional-changelog-conventionalcommits@7

      - name: Create .releaserc.json
        run: |
          cat > .releaserc.json << 'EOF'
          {
            "branches": ["master"],
            "tagFormat": "v${version}",
            "plugins": [
              [
                "@semantic-release/commit-analyzer",
                {
                  "preset": "conventionalcommits",
                  "releaseRules": [
                    {"type": "feat", "release": "minor"},
                    {"type": "fix", "release": "patch"},
                    {"type": "perf", "release": "patch"},
                    {"type": "revert", "release": "patch"},
                    {"type": "refactor", "release": "patch"},
                    {"type": "docs", "release": false},
                    {"type": "style", "release": false},
                    {"type": "chore", "release": false},
                    {"type": "test", "release": false},
                    {"type": "build", "release": false},
                    {"type": "ci", "release": false}
                  ]
                }
              ],
              [
                "@semantic-release/release-notes-generator",
                {
                  "preset": "conventionalcommits"
                }
              ],
              [
                "@semantic-release/exec",
                {
                  "prepareCmd": "sed -i 's/^version: .*/version: ${nextRelease.version}/' deploy/helm/lighthouse/Chart.yaml && sed -i 's/^appVersion: .*/appVersion: \"${nextRelease.version}\"/' deploy/helm/lighthouse/Chart.yaml"
                }
              ],
              [
                "@semantic-release/git",
                {
                  "assets": ["deploy/helm/lighthouse/Chart.yaml"],
                  "message": "chore(release): ${nextRelease.version} [skip ci]"
                }
              ]
            ]
          }
          EOF

      - name: Run semantic-release (creates + pushes tag)
        id: semrel
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npx semantic-release
          # Remove untracked config so goreleaser sees a clean tree.
          rm -f .releaserc.json
          if tag=$(git describe --tags --exact-match HEAD 2>/dev/null); then
            echo "released=true" >> "$GITHUB_OUTPUT"
            echo "tag=$tag" >> "$GITHUB_OUTPUT"
          else
            echo "released=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run goreleaser
        if: steps.semrel.outputs.released == 'true'
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Helm chart to GHCR (OCI)
        if: steps.semrel.outputs.released == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.semrel.outputs.tag }}
        run: |
          VERSION="${TAG#v}"
          echo "$GITHUB_TOKEN" | helm registry login ghcr.io -u "${{ github.actor }}" --password-stdin
          helm package deploy/helm/lighthouse --destination /tmp/charts
          helm push "/tmp/charts/lighthouse-${VERSION}.tgz" oci://ghcr.io/statusharbor/charts
          helm registry logout ghcr.io

      - name: Send Telegram notification on success
        if: ${{ success() && steps.semrel.outputs.released == 'true' }}
        uses: appleboy/telegram-action@v0.1.1
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            Release Success - Lighthouse ${{ steps.semrel.outputs.tag }}

            Repository: ${{ github.repository }}
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
            Message: ${{ github.event.head_commit.message }}
            Author: ${{ github.actor }}

            View: ${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ steps.semrel.outputs.tag }}

      - name: Send Telegram notification on failure
        if: ${{ failure() }}
        uses: appleboy/telegram-action@v0.1.1
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            Release Failed - Lighthouse

            Repository: ${{ github.repository }}
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
            Message: ${{ github.event.head_commit.message }}
            Author: ${{ github.actor }}

            View: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
