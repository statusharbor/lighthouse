# goreleaser config for Status Harbor Lighthouse.
# Triggered by .github/workflows/release.yml on tag push (v*).
#
# Per design doc §12.3: signed binaries (cosign keyless), SBOM (syft, SPDX),
# SHA256 checksums.
version: 2

project_name: lighthouse

before:
  hooks:
    - go mod tidy

builds:
  - id: lighthouse
    main: ./cmd/lighthouse
    binary: lighthouse_{{ .Os }}_{{ .Arch }}{{ if .Arm }}v{{ .Arm }}{{ end }}
    no_unique_dist_dir: true # produce flat dist/ for easier release uploads
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/statusharbor/lighthouse/internal/agent.AgentVersion={{ .Version }}
    goos:
      - linux
      - darwin
      - windows
      - freebsd
    goarch:
      - amd64
      - arm64
      - "386"
      - arm
      - riscv64
    goarm:
      - "6"
      - "7"
    ignore:
      # darwin: only amd64 + arm64 supported by modern Go.
      - { goos: darwin, goarch: "386" }
      - { goos: darwin, goarch: arm }
      - { goos: darwin, goarch: riscv64 }
      # windows: 32-bit arm dropped; riscv64 not supported.
      - { goos: windows, goarch: arm }
      - { goos: windows, goarch: riscv64 }
    # Windows binaries get a .exe suffix automatically via goreleaser when
    # GOOS=windows. The binary template above expands to e.g.
    # `lighthouse_windows_amd64.exe`.

  # Linux-only build that produces a plain `lighthouse` binary for nfpm
  # so the .deb installs at /usr/bin/lighthouse (not /usr/bin/lighthouse_linux_amd64).
  - id: lighthouse-pkg
    main: ./cmd/lighthouse
    binary: lighthouse
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/statusharbor/lighthouse/internal/agent.AgentVersion={{ .Version }}
    goos: [linux]
    goarch: [amd64, arm64, "386", arm]
    goarm: ["6", "7"]

archives:
  # Skip archives — we ship raw binaries the install.sh can fetch directly.
  - id: raw
    formats: [binary]
    ids: [lighthouse]
    name_template: "{{ .Binary }}"

nfpms:
  - id: lighthouse-pkgs
    package_name: lighthouse
    ids: [lighthouse-pkg]
    formats: [deb, apk]
    file_name_template: "lighthouse_{{ .Version }}_{{ .Arch }}{{ if .Arm }}v{{ .Arm }}{{ end }}"
    maintainer: Status Harbor <ops@statusharbor.com>
    description: |
      Status Harbor Lighthouse — private network monitoring agent.
      Single static binary that runs inside your private network and
      reports check results to the Status Harbor Console over outbound
      HTTPS only.
    vendor: Status Harbor
    homepage: https://statusharbor.com
    license: Apache-2.0
    bindir: /usr/bin
    section: net
    priority: optional

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

# SBOM in SPDX JSON, one per published binary. Scoped to the `lighthouse`
# build so we get one SBOM per OS/arch (unique filenames). The
# `lighthouse-pkg` binaries are the same source and would produce
# identical SBOMs with colliding names.
sboms:
  - id: lighthouse-sbom
    artifacts: binary
    ids: [lighthouse]
    documents:
      - "{{ .ArtifactName }}.spdx.json"
    cmd: syft
    args: ["$artifact", "--output", "spdx-json=$document"]

# Cosign keyless signing (Sigstore). The keyless flow uses the GitHub
# Actions OIDC token; no private key is stored anywhere. Scoped to
# `lighthouse` for the same reason as sboms.
signs:
  - id: cosign-binary
    artifacts: binary
    ids: [lighthouse]
    cmd: cosign
    args:
      - sign-blob
      - "--yes"
      - "--output-certificate=${artifact}.cert"
      - "--output-signature=${artifact}.sig"
      - "${artifact}"
    output: true

# Multi-arch Docker images on GHCR. One image per arch, then a manifest
# list combines them. Uses the `lighthouse-pkg` build whose binary is
# named `lighthouse` (matches the COPY in Dockerfile).
dockers:
  - id: lighthouse-amd64
    goos: linux
    goarch: amd64
    ids: [lighthouse-pkg]
    use: buildx
    dockerfile: Dockerfile
    image_templates:
      - "ghcr.io/statusharbor/lighthouse:{{ .Version }}-amd64"
      - "ghcr.io/statusharbor/lighthouse:{{ .Major }}.{{ .Minor }}-amd64"
      - "ghcr.io/statusharbor/lighthouse:{{ .Major }}-amd64"
      - "ghcr.io/statusharbor/lighthouse:latest-amd64"
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.title=lighthouse"
      - "--label=org.opencontainers.image.description=Status Harbor Lighthouse — private network monitoring agent"
      - "--label=org.opencontainers.image.source=https://github.com/statusharbor/lighthouse"
      - "--label=org.opencontainers.image.url=https://statusharbor.com"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.created={{ .Date }}"
      - "--label=org.opencontainers.image.licenses=Apache-2.0"

  - id: lighthouse-arm64
    goos: linux
    goarch: arm64
    ids: [lighthouse-pkg]
    use: buildx
    dockerfile: Dockerfile
    image_templates:
      - "ghcr.io/statusharbor/lighthouse:{{ .Version }}-arm64"
      - "ghcr.io/statusharbor/lighthouse:{{ .Major }}.{{ .Minor }}-arm64"
      - "ghcr.io/statusharbor/lighthouse:{{ .Major }}-arm64"
      - "ghcr.io/statusharbor/lighthouse:latest-arm64"
    build_flag_templates:
      - "--platform=linux/arm64"
      - "--label=org.opencontainers.image.title=lighthouse"
      - "--label=org.opencontainers.image.description=Status Harbor Lighthouse — private network monitoring agent"
      - "--label=org.opencontainers.image.source=https://github.com/statusharbor/lighthouse"
      - "--label=org.opencontainers.image.url=https://statusharbor.com"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.created={{ .Date }}"
      - "--label=org.opencontainers.image.licenses=Apache-2.0"

docker_manifests:
  - name_template: "ghcr.io/statusharbor/lighthouse:{{ .Version }}"
    image_templates:
      - "ghcr.io/statusharbor/lighthouse:{{ .Version }}-amd64"
      - "ghcr.io/statusharbor/lighthouse:{{ .Version }}-arm64"
  - name_template: "ghcr.io/statusharbor/lighthouse:{{ .Major }}.{{ .Minor }}"
    image_templates:
      - "ghcr.io/statusharbor/lighthouse:{{ .Major }}.{{ .Minor }}-amd64"
      - "ghcr.io/statusharbor/lighthouse:{{ .Major }}.{{ .Minor }}-arm64"
  - name_template: "ghcr.io/statusharbor/lighthouse:{{ .Major }}"
    image_templates:
      - "ghcr.io/statusharbor/lighthouse:{{ .Major }}-amd64"
      - "ghcr.io/statusharbor/lighthouse:{{ .Major }}-arm64"
  - name_template: "ghcr.io/statusharbor/lighthouse:latest"
    image_templates:
      - "ghcr.io/statusharbor/lighthouse:latest-amd64"
      - "ghcr.io/statusharbor/lighthouse:latest-arm64"

# Cosign keyless signing for Docker images (signs the multi-arch manifest list).
docker_signs:
  - id: cosign-image
    artifacts: manifests
    cmd: cosign
    args:
      - sign
      - "--yes"
      - "${artifact}@${digest}"
    output: true

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  draft: false
  github:
    owner: statusharbor
    name: lighthouse
  header: |
    ## Lighthouse {{ .Tag }}

    Verify a downloaded binary:
    ```bash
    cosign verify-blob \
      --certificate lighthouse_linux_amd64.cert \
      --signature  lighthouse_linux_amd64.sig \
      --certificate-identity-regexp 'https://github.com/statusharbor/lighthouse' \
      --certificate-oidc-issuer 'https://token.actions.githubusercontent.com' \
      lighthouse_linux_amd64
    ```
